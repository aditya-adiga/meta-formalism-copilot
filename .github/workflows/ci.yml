name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test
 
      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      # --omit=dev: only audit production deps (the ones that ship to users).
      # --audit-level=high: fail only on high+ severity. Lower levels are
      # informational and would otherwise make every fresh CVE break CI on
      # branches that have nothing to do with security.
      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high
